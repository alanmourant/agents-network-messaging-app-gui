name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate scripts
        run: npm run check

      - name: Build portable Windows app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win portable --publish never

      - name: Resolve release asset
        id: asset
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path dist -Filter "LAN Device Finder Setup *.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $asset) {
            throw "Portable executable not found in dist."
          }

          "path=$($asset.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($asset.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate macOS signing secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()

          [ -z "${CSC_LINK:-}" ] && missing+=("MACOS_CERT_P12_BASE64")
          [ -z "${CSC_KEY_PASSWORD:-}" ] && missing+=("MACOS_CERT_PASSWORD")
          [ -z "${APPLE_ID:-}" ] && missing+=("APPLE_ID")
          [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -z "${APPLE_TEAM_ID:-}" ] && missing+=("APPLE_TEAM_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub secrets for signed/notarized macOS build: ${missing[*]}"
            exit 1
          fi

      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg --publish never

      - name: Resolve DMG asset
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          asset="$(ls -t dist/*.dmg 2>/dev/null | head -n1 || true)"

          if [ -z "$asset" ]; then
            echo "macOS DMG not found in dist."
            exit 1
          fi

          echo "path=$asset" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.dmg.outputs.path }}
          fail_on_unmatched_files: true
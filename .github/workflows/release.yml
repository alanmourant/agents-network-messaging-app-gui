name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate scripts
        run: npm run check

      - name: Build portable Windows app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win portable --publish never

      - name: Resolve release asset
        id: asset
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path dist -Filter "LAN Device Finder Setup *.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $asset) {
            throw "Portable executable not found in dist."
          }

          "path=$($asset.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($asset.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.asset.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true